<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Circular Logo</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: black;
        }
        .logo {
            width: 500px;
            height: 500px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, rgba(0, 0, 0, 0.8) 30%, rgba(0, 0, 0, 0) 70%);
            box-shadow: 0 0 20px cyan, 0 0 40px magenta;
            position: relative;
            overflow: hidden;
        }
        .logo::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 20px cyan, 0 0 40px magenta, 0 0 60px blue;
            animation: pulsate 1.5s infinite alternate;
        }
        .background-image {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: url('logo.jpeg') center/cover no-repeat;
            opacity: 1;
        }
  
        @keyframes pulsate {
            from {
                box-shadow: 0 0 20px cyan, 0 0 40px magenta;
            }
            to {
                box-shadow: 0 0 30px cyan, 0 0 50px magenta, 0 0 70px blue;
            }
        }
    </style>
</head>
<body>
    <div class="logo">
        <div class="background-image"></div>
    </div>
</body>
</html>
